{% extends "base.html" %}
{% block title %}商品編集 - 喫茶店 在庫管理{% endblock %}

{% block body_class %}page-products{% endblock %}
{% block content %}
<h1>商品を編集</h1>

<div class="form-section">
    <form method="POST" class="record-form">
        <div class="form-row">
            <div class="form-group">
                <label for="name">商品名</label>
                <input type="text" name="name" id="name" value="{{ product.name }}" required>
            </div>
            <div class="form-group">
                <label for="category">カテゴリー</label>
                <select name="category" id="category">
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if product.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                    <option value="">-- 新規カテゴリー --</option>
                </select>
            </div>
            <div class="form-group">
                <label for="new_category">新規カテゴリー</label>
                <input type="text" name="new_category" id="new_category" placeholder="空欄なら上の選択を使用">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="unit">単位</label>
                <input type="text" name="unit" id="unit" value="{{ product.unit }}" required>
            </div>
            <div class="form-group">
                <label for="min_stock">最低在庫数</label>
                <input type="number" name="min_stock" id="min_stock" value="{{ product.min_stock }}" min="0">
            </div>
        </div>
        <div class="form-group">
            <label for="supplier">仕入れ先</label>
            <input type="text" name="supplier" id="supplier" value="{{ product.supplier }}" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">更新する</button>
            <a href="{{ url_for('products') }}" class="btn btn-outline">キャンセル</a>
        </div>
    </form>
</div>
{% endblock %}
