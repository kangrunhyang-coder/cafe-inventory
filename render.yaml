databases:
  - name: cafe-inventory-db
    plan: free
    databaseName: cafe_inventory

services:
  - type: web
    name: cafe-inventory
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-inventory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
